<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estimating pi by throwing darts</title>
<style>
  :root{
    --bg:#111111; --panel:#181820; --dim:#999999; --white:#ffffff;
    --accent:#64B5F6; --red:#EF5350; --green:#66BB6A; --yellow:#FFEB3B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--white);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"DejaVu Sans",sans-serif;overflow:hidden;}
  #app{display:flex;height:100vh;width:100vw;}
  #left{flex:0 0 56%;position:relative;display:flex;align-items:center;justify-content:center;}
  #right{flex:1;display:flex;flex-direction:column;border-left:1px solid #2a2a33;min-width:0;}
  canvas{display:block;}
  #spark{flex:1;min-height:0;}
  #readout{padding:14px 16px;border-bottom:1px solid #2a2a33;}
  #pihat{font-size:34px;font-weight:700;color:var(--yellow);}
  .lbl{font-size:12px;color:var(--dim);letter-spacing:.03em;}
  .val{font-size:15px;}
  #controls{padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;border-top:1px solid #2a2a33;}
  button{background:#23232e;color:var(--white);border:1px solid #3a3a46;border-radius:6px;
    padding:7px 12px;font-size:13px;cursor:pointer;}
  button:hover{background:#2e2e3a;}
  #sparkbox{flex:1;position:relative;min-height:0;}
  .panel-label{position:absolute;top:6px;left:10px;font-size:12px;color:var(--dim);
    font-weight:600;z-index:2;pointer-events:none;}
</style>
</head>
<body>
<div id="app">
  <div id="left"><canvas id="board" width="520" height="520"></canvas></div>
  <div id="right">
    <div id="readout">
      <div class="lbl">ESTIMATE&nbsp; π̂ = 4 × inside / total</div>
      <div id="pihat">—</div>
      <div class="val"><span class="lbl">darts:</span> <span id="n">0</span>
        &nbsp;&nbsp;<span class="lbl">inside:</span> <span id="nin">0</span></div>
      <div class="val"><span class="lbl">error vs π:</span> <span id="err">—</span></div>
    </div>
    <div id="sparkbox">
      <div class="panel-label">π̂ as darts accumulate (yellow line = π)</div>
      <canvas id="spark"></canvas>
    </div>
    <div id="controls">
      <button onclick="throwN(1)">Throw 1</button>
      <button onclick="throwN(100)">Throw 100</button>
      <button onclick="throwN(10000)">Throw 10,000</button>
      <button onclick="resetAll()">Reset</button>
    </div>
  </div>
</div>
<script>
"use strict";
// deterministic PRNG so reloads look the same
let seed = 12345;
function rand(){ seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; }

const board = document.getElementById("board"), bctx = board.getContext("2d");
const spark = document.getElementById("spark"), sctx = spark.getContext("2d");
let nTot = 0, nIn = 0, history = [];   // history: [n, pihat]
const MAXDOTS = 30000;                 // cap drawn dots for performance

function drawBoard(){ // background + arc (dots are drawn incrementally)
  bctx.fillStyle = "#181820"; bctx.fillRect(0,0,520,520);
  bctx.strokeStyle = "#3a3a46"; bctx.lineWidth = 1.5; bctx.strokeRect(10,10,500,500);
  bctx.beginPath(); bctx.arc(10, 510, 500, -Math.PI/2, 0);
  bctx.strokeStyle = "#cccccc"; bctx.lineWidth = 2; bctx.stroke();
}
function dot(x, y, inside){
  bctx.fillStyle = inside ? "rgba(102,187,106,.85)" : "rgba(239,83,80,.85)";
  bctx.beginPath(); bctx.arc(10 + x*500, 510 - y*500, 1.6, 0, 2*Math.PI); bctx.fill();
}
function throwN(k){
  for (let i = 0; i < k; i++){
    const x = rand(), y = rand(), inside = x*x + y*y <= 1;
    nTot++; if (inside) nIn++;
    if (nTot <= MAXDOTS) dot(x, y, inside);
    if (nTot < 100 || nTot % Math.max(1, Math.floor(nTot/200)) === 0)
      history.push([nTot, 4*nIn/nTot]);
  }
  history.push([nTot, 4*nIn/nTot]);
  updateReadout(); drawSpark();
}
function updateReadout(){
  const est = nTot ? 4*nIn/nTot : NaN;
  document.getElementById("n").textContent = nTot.toLocaleString();
  document.getElementById("nin").textContent = nIn.toLocaleString();
  document.getElementById("pihat").textContent = nTot ? est.toFixed(4) : "—";
  document.getElementById("err").textContent = nTot ? (est - Math.PI).toFixed(4) : "—";
}
function drawSpark(){
  const W = spark.width = spark.clientWidth, H = spark.height = spark.clientHeight;
  sctx.fillStyle = "#14141b"; sctx.fillRect(0,0,W,H);
  if (history.length < 2) return;
  const n0 = Math.log10(1), n1 = Math.log10(Math.max(10, nTot));
  const lo = 2.4, hi = 4.0;
  const X = n => 38 + (Math.log10(Math.max(1,n)) - n0)/(n1 - n0) * (W - 50);
  const Y = v => H - 22 - (Math.min(hi, Math.max(lo, v)) - lo)/(hi - lo) * (H - 45);
  // pi line
  sctx.strokeStyle = "#FFEB3B"; sctx.lineWidth = 1.2; sctx.setLineDash([5,4]);
  sctx.beginPath(); sctx.moveTo(38, Y(Math.PI)); sctx.lineTo(W-12, Y(Math.PI)); sctx.stroke();
  sctx.setLineDash([]);
  sctx.fillStyle = "#FFEB3B"; sctx.font = "11px sans-serif";
  sctx.fillText("π", 24, Y(Math.PI)+4);
  // estimate path
  sctx.strokeStyle = "#64B5F6"; sctx.lineWidth = 1.6; sctx.beginPath();
  history.forEach(([n,v], i) => { const x = X(n), y = Y(v); i ? sctx.lineTo(x,y) : sctx.moveTo(x,y); });
  sctx.stroke();
  // axes hint
  sctx.fillStyle = "#777"; sctx.font = "10px sans-serif";
  sctx.fillText("1", 36, H-8); sctx.fillText(nTot.toLocaleString(), W-60, H-8);
  sctx.fillText("(log n)", W/2-16, H-8);
}
function resetAll(){
  seed = 12345; nTot = 0; nIn = 0; history = [];
  drawBoard(); updateReadout(); drawSpark();
}
window.addEventListener("resize", drawSpark);
drawBoard();
throwN(500);   // auto-seed so the widget loads with meaningful state
</script>
</body>
</html>
