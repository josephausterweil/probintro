baseURL = 'https://josephausterweil.github.io/probintro/'
locale = 'en-us'
title = 'Probability & Probabilistic Computing Tutorial'
theme = 'hugo-theme-relearn'
images = ['images/chibanyplain.png']

# Multilingual: English at the site root (unchanged URLs), Japanese added under /ja/.
# Translations are filename-based (*.ja.md siblings); both languages share content/.
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

[params]
    math = true
    # Enable a page-level TOC (headings) in the sidebar
    showToc = true
    # Optional: expand sub-sections automatically
    alwaysopen = true
    # Show a checkmark in the sidebar next to pages the reader has already
    # visited (tracked per-browser via localStorage).
    showVisitedLinks = true
    # Description for SEO
    description = "Learn probability theory through sets and prepare for probabilistic programming"
    # Author info
    author = "Joseph Austerweil"

    # Theme color customization - SDS/JPCCA blue instead of default green
    # Using relearn-dark for dark main content area
    themeVariant = "relearn-dark"

    # Mermaid diagram configuration for better rendering reliability
    # Using v10.9.3 which has better block-beta support
    customMermaidURL = "https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.min.js"

    # Mermaid initialization settings
    mermaidInitialize = """{
      "startOnLoad": true,
      "theme": "base",
      "securityLevel": "loose",
      "themeVariables": {
        "primaryColor": "#fff",
        "primaryTextColor": "#000",
        "primaryBorderColor": "#000",
        "lineColor": "#000",
        "secondaryColor": "#fff",
        "tertiaryColor": "#fff"
      },
      "flowchart": {
        "htmlLabels": true,
        "curve": "basis"
      },
      "block": {
        "padding": 8
      }
    }"""

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[markup.tableOfContents]
  startLevel = 2
  endLevel = 6

# Enable syntax highlighting for code blocks
[markup.highlight]
  style = "monokai"
  lineNos = true

# Allow HTML in markdown (for embedded visualizations, etc.)
[markup.goldmark.renderer]
  unsafe = true

# Languages: English (default, served at root) + Japanese (machine-translated, /ja/).
# Per-language overrides only; [params]/[markup]/[caches] above stay global so JA
# inherits identical math + mermaid behavior.
[languages]
  [languages.en]
    label = 'English'
    locale = 'en-us'
    weight = 1
    title = 'Probability & Probabilistic Computing Tutorial'
  [languages.ja]
    label = '日本語'
    locale = 'ja'
    weight = 2
    title = '確率と確率的計算のチュートリアル（機械翻訳）'
