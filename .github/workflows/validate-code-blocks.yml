name: Validate Code Blocks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # genjax's PyPI wheel declares Python 3.10/3.11 support; pin to 3.11 so the
    # validator's dependencies install reliably on the runner.
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # The validator EXECUTES every code block and compares its printed output, so
    # it needs jax + genjax + the plotting/stats libs the chapters import. Pinned
    # in requirements-validate.txt to the versions the chapters were authored
    # against, so CI reproduces local results.
    #
    # genjax can be finicky to install; if the install fails for any reason we do
    # NOT want a hard red that blocks every push. So: try to install the full
    # stack, and record whether it succeeded.
    - name: Install validator dependencies
      id: deps
      run: |
        if pip install -r requirements-validate.txt; then
          echo "mode=execute" >> "$GITHUB_OUTPUT"
          echo "✅ Full validator deps installed — will EXECUTE + compare outputs."
        else
          echo "mode=syntax" >> "$GITHUB_OUTPUT"
          echo "::warning::genjax/jax install failed — falling back to syntax-only validation (--no-exec)."
        fi

    # If deps installed, run the real execute-and-compare validation.
    # If they didn't, fall back to syntax-only checking (no deps needed), so the
    # workflow still catches Python syntax errors and stays meaningful.
    - name: Validate code blocks
      run: |
        if [ "${{ steps.deps.outputs.mode }}" = "execute" ]; then
          echo "Running execute-and-compare validation…"
          python validate_code_blocks.py
        else
          echo "Running syntax-only validation (dependency install failed)…"
          python validate_code_blocks.py --no-exec
        fi
